<!doctype html>
<html lang="en-US">
<head title="Dulles Arrivals">
<meta http-equiv="refresh" content="600">
<meta http-equiv="Content-type" content="text/html; charset=utf-8">
<link rel="stylesheet" type="text/css" href="https://cdn.datatables.net/1.11.3/css/jquery.dataTables.min.css">
<script type="text/javascript" src="https://code.jquery.com/jquery-3.5.1.js"></script>
<script type="text/javascript" src="https://cdn.datatables.net/1.12.1/js/jquery.dataTables.min.js"></script>
<style>
    .InGate {
      background-color: #34ec34;
    }
    .InAir {
      background-color:skyblue;
    }
    .Delayed {
      background-color: #ffc42f;
    }
    .OutGate {
      background-color:burlywood;
    }
    .Cancelled {
      background-color: rgba(245, 2, 2, 0.45);text-decoration: line-through;
    }
</style>

<script type="text/javascript">
   $(document).ready(function() {
     // Setup - add a text input to each footer cell
     $('#example thead tr').clone(true).addClass('filters').appendTo('#example thead');
     var table = $('#example').DataTable({
       orderCellsTop: true,
       fixedHeader: true,
       initComplete: function() {
         var api = this.api();
         // For each column
         api.columns().eq(0).each(function(colIdx) {
           // Set the header cell to contain the input element
           var cell = $('.filters th').eq($(api.column(colIdx).header()).index());
           var title = $(cell).text();
           $(cell).html('<input type="text" placeholder="' + title + '" />');
           // On every keypress in this input
           $('input', $('.filters th').eq($(api.column(colIdx).header()).index())).off('keyup change').on('change', function(e) {
             // Get the search value
             $(this).attr('title', $(this).val());
             var regexr = '({search})'; //$(this).parents('th').find('select').val();
             var cursorPosition = this.selectionStart;
             // Search the column for that value
             api.column(colIdx).search(this.value != '' ? regexr.replace('{search}', '(((' + this.value + ')))') : '', this.value != '', this.value == '').draw();
           }).on('keyup', function(e) {
             e.stopPropagation();
             $(this).trigger('change');
             $(this).focus()[0].setSelectionRange(cursorPosition, cursorPosition);
           });
         });
       },
     });
   });
</script>


    <title></title>
</head>

<body class="container">
<h1 class="text-center">IAD Arrivals</h1>
