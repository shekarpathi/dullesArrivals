<!doctype html>
<head title="Dulles Arrivals">
<meta http-equiv="refresh" content="600">
<meta http-equiv="Content-type" content="text/html; charset=utf-8">
<link rel="stylesheet" type="text/css" href="https://cdn.datatables.net/1.11.3/css/jquery.dataTables.min.css">
<script type="text/javascript" src="https://code.jquery.com/jquery-3.5.1.js"></script>
<script type="text/javascript" src="https://cdn.datatables.net/1.12.1/js/jquery.dataTables.min.js"></script>
<style>
    .InGate {
      background-color: #34ec34;
    }
    .InAir {
      background-color:skyblue;
    }
    .Delayed {
      background-color: #ffc42f;
    }
    .OutGate {
      background-color:burlywood;
    }
    .Cancelled {
      background-color: rgba(245, 2, 2, 0.45);text-decoration: line-through;
    }
</style>

<script type="text/javascript">
   $(document).ready(function() {
     // Setup - add a text input to each footer cell
     $('#example thead tr').clone(true).addClass('filters').appendTo('#example thead');
     let table = $('#example').DataTable({
       orderCellsTop: true,
         autoWidth: false,
       fixedHeader: true,
       initComplete: function() {
         let api = this.api();
         // For each column
         api.columns().eq(0).each(function(colIdx) {
           // Set the header cell to contain the input element
           let cell = $('.filters th').eq($(api.column(colIdx).header()).index());
           let title = $(cell).text();
           $(cell).html('<input type="text" placeholder="' + title + '" />');
           // On every keypress in this input
           $('input', $('.filters th').eq($(api.column(colIdx).header()).index())).off('keyup change').on('change', function(e) {
             // Get the search value
             $(this).attr('title', $(this).val());
             let regexr = '({search})'; //$(this).parents('th').find('select').val();
             let cursorPosition = this.selectionStart;
             // Search the column for that value
             api.column(colIdx).search(this.value != '' ? regexr.replace('{search}', '(((' + this.value + ')))') : '', this.value != '', this.value == '').draw();
           }).on('keyup', function(e) {
             e.stopPropagation();
             $(this).trigger('change');
             $(this).focus()[0].setSelectionRange(cursorPosition, cursorPosition);
           });
         });
       },
     });
   });
</script>
<title>IAD Arrivals</title>
</head>

<body class="container">
<h1 class="text-center">IAD Arrivals</h1>
    <table data-order='[[ 6, "asc" ]]' data-page-length='300' id="example" class="cell-border order-column" style="width:100%">
    <thead>
            <tr>
                <th style="width: 5%">Flight</th>
                <th>Origin</th>
                <th>Origin IATA</th>
                <th>Dom/Int</th>
                <th>Gate</th>
                <th>Status</th>
                <th>Gate Time</th>
                <th>Customs</th>
                <th>Baggage Carousel</th>
            </tr>
        </thead>
        <tbody>

    </tbody>
    </table>
    <script>
        const rows = document.querySelectorAll('td');
        rows.forEach((row) => {
          if (row.innerHTML === 'InAir') {
            const parent = row.parentNode;
            parent.style.backgroundColor = 'Cornsilk';
          }
          else if (row.innerHTML === 'InGate') {
            const parent = row.parentNode;
            parent.style.backgroundColor = 'HoneyDew';
          }
          else if (row.innerHTML === 'Delayed') {
            const parent = row.parentNode;
            parent.style.backgroundColor = 'SeaShell';
          }
        });
    </script>
    <p id="update" onclick="myFunction()">Information current as of Mar 13, 2024 05:42 AM</p>
    <p id="info" onclick="myFunction()">Click here to refresh this page</p>
    <script>
        function myFunction() {
          document.getElementById("info").innerHTML = "Page refreshed at ";
          location.reload()
        }
    </script>
