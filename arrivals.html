<!DOCTYPE html>
<html>
<head>
	<meta http-equiv="refresh" content="600">
	<meta http-equiv="Content-type" content="text/html; charset=utf-8">
	<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<link rel="stylesheet" type="text/css" href="https://cdn.datatables.net/1.11.3/css/jquery.dataTables.min.css">

<script type="text/javascript" src="https://code.jquery.com/jquery-3.5.1.js"></script>
<script type="text/javascript" src="https://cdn.datatables.net/1.12.1/js/jquery.dataTables.min.js"></script>
<script type="text/javascript" src="https://cdn.datatables.net/fixedheader/3.2.3/js/dataTables.fixedHeader.min.js"></script>
<script type="text/javascript">


$(document).ready(function () {
    // Setup - add a text input to each footer cell
    $('#example thead tr')
        .clone(true)
        .addClass('filters')
        .appendTo('#example thead');
 
    var table = $('#example').DataTable({
    "autoWidth": false,
        "columnDefs": [
        {"className": "dt-left", "targets": "_all", "width": "5%"},
      {
        targets: 1,
         width: 1
      }
      ],
      
        orderCellsTop: true,
        fixedHeader: true,
        initComplete: function () {
            var api = this.api();
 
            // For each column
            api
                .columns()
                .eq(0)
                .each(function (colIdx) {
                    // Set the header cell to contain the input element
                    var cell = $('.filters th').eq(
                        $(api.column(colIdx).header()).index()
                    );
                    var title = $(cell).text();
                    $(cell).html('<input type="text" placeholder="' + title + '" />');
 
                    // On every keypress in this input
                    $(
                        'input',
                        $('.filters th').eq($(api.column(colIdx).header()).index())
                    )
                        .off('keyup change')
                        .on('change', function (e) {
                            // Get the search value
                            $(this).attr('title', $(this).val());
                            var regexr = '({search})'; //$(this).parents('th').find('select').val();
 
                            var cursorPosition = this.selectionStart;
                            // Search the column for that value
                            api
                                .column(colIdx)
                                .search(
                                    this.value != ''
                                        ? regexr.replace('{search}', '(((' + this.value + ')))')
                                        : '',
                                    this.value != '',
                                    this.value == ''
                                )
                                .draw();
                        })
                        .on('keyup', function (e) {
                            e.stopPropagation();
 
                            $(this).trigger('change');
                            $(this)
                                .focus()[0]
                                .setSelectionRange(cursorPosition, cursorPosition);
                        });
                });
        },
    });
});

</script>

<style type="text/css" class="init">
thead input {
        width: 100%;
    }
    .selected{
  background-color:green;
}
.bad{
  background-color:red;
}
</style>

</head>
<table data-order='[[ 4, "asc" ]]' data-page-length='15' id="example" class="cell-border" style="width:100%">
<thead>
            <tr>
                <th>Number</th>
                <th>Origin</th>
                <th>Gate</th>
                <th>Status</th>
                <th>Gate Time</th>
                <th>Customs</th>
                <th>In Customs since</th>
                <th>Baggage Carousel</th>
                <th>Carousel</th>
                <th>Carousel1</th>
                <th>Carousel2</th>
            </tr>
        </thead>
        <tbody>
</tbody>
</table>

<script>
    const rows = document.querySelectorAll('td');
    rows.forEach((row) => {
      if (row.innerHTML === 'InAir') {
        const parent = row.parentNode;
        parent.style.backgroundColor = 'Cornsilk';
      }
      else if (row.innerHTML === 'InGate') {
        const parent = row.parentNode;
        parent.style.backgroundColor = 'HoneyDew';
      }
      else if (row.innerHTML === 'Delayed') {
        const parent = row.parentNode;
        parent.style.backgroundColor = 'SeaShell';
      }
    });
</script>
<p id="update" onclick="myFunction()">Information current as of Feb 15, 2024 02:36 AM</p><p id="info" onclick="myFunction()">Click here to refresh this page</p>
    <script>
        function myFunction() {
          document.getElementById("info").innerHTML = "Page refreshed at ";
          location.reload()
        }
    </script>
</html>
